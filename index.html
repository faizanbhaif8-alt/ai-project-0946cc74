<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Calculator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Link to Font Awesome for icons (using CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-calculator"></i> Smart Calculator</h1>
            <p class="subtitle">A clean, responsive calculator with basic operations and memory functions</p>
        </header>

        <main class="calculator-wrapper">
            <!-- Display Section -->
            <div class="display-container">
                <div class="memory-indicator" id="memoryIndicator">
                    <span id="memoryStatus">No memory stored</span>
                </div>
                <div class="display" id="display">0</div>
                <div class="expression" id="expression"></div>
            </div>

            <!-- Calculator Buttons Grid -->
            <div class="buttons-grid">
                <!-- First Row: Memory and Clear buttons -->
                <button class="btn memory-btn" data-action="memory-clear" title="Clear Memory">
                    MC
                </button>
                <button class="btn memory-btn" data-action="memory-recall" title="Recall Memory">
                    MR
                </button>
                <button class="btn memory-btn" data-action="memory-add" title="Add to Memory">
                    M+
                </button>
                <button class="btn memory-btn" data-action="memory-subtract" title="Subtract from Memory">
                    M-
                </button>
                <button class="btn operator-btn" data-action="clear" title="Clear All">
                    AC
                </button>
                <button class="btn operator-btn" data-action="backspace" title="Backspace">
                    <i class="fas fa-backspace"></i>
                </button>
                <button class="btn operator-btn" data-operator="/" title="Divide">
                    ÷
                </button>

                <!-- Second Row: Numbers and Operators -->
                <button class="btn number-btn" data-number="7">
                    7
                </button>
                <button class="btn number-btn" data-number="8">
                    8
                </button>
                <button class="btn number-btn" data-number="9">
                    9
                </button>
                <button class="btn operator-btn" data-operator="*" title="Multiply">
                    ×
                </button>

                <!-- Third Row: Numbers and Operators -->
                <button class="btn number-btn" data-number="4">
                    4
                </button>
                <button class="btn number-btn" data-number="5">
                    5
                </button>
                <button class="btn number-btn" data-number="6">
                    6
                </button>
                <button class="btn operator-btn" data-operator="-" title="Subtract">
                    −
                </button>

                <!-- Fourth Row: Numbers and Operators -->
                <button class="btn number-btn" data-number="1">
                    1
                </button>
                <button class="btn number-btn" data-number="2">
                    2
                </button>
                <button class="btn number-btn" data-number="3">
                    3
                </button>
                <button class="btn operator-btn" data-operator="+" title="Add">
                    +
                </button>

                <!-- Fifth Row: Zero, Decimal, and Equals -->
                <button class="btn number-btn zero-btn" data-number="0">
                    0
                </button>
                <button class="btn number-btn" data-action="decimal" title="Decimal Point">
                    .
                </button>
                <button class="btn equals-btn" data-action="calculate" title="Calculate">
                    =
                </button>
            </div>

            <!-- History Section -->
            <div class="history-section">
                <div class="history-header">
                    <h3><i class="fas fa-history"></i> Calculation History</h3>
                    <button class="btn-small" id="clearHistory" title="Clear History">
                        Clear
                    </button>
                </div>
                <div class="history-list" id="historyList">
                    <!-- History items will be added here dynamically -->
                    <div class="history-empty">No calculations yet</div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>Smart Calculator &copy; <span id="currentYear"></span> | Built with HTML, CSS & JavaScript</p>
            <p class="footer-note">Supports keyboard input: Numbers, +, -, *, /, Enter, Escape, Backspace</p>
        </footer>
    </div>

    <!-- JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
